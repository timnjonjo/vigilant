# Production profile overrides (activate with SPRING_PROFILES_ACTIVE=prod).
#
# The interactive, auth-enabled API explorer is a developer convenience — not
# something a live fintech-facing deployment should expose by default. Turning
# off both the raw spec and the UI leaves no OpenAPI surface reachable unless a
# prod deploy deliberately re-enables it.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Structured logging: emit the console as Elastic Common Schema JSON, one object
# per line, for ingestion by a log pipeline. requestId (MDC) and every DomainEvent
# key/value pair become top-level JSON fields, so the approved payout_decision
# shape — {event, requestId, tenantId, campaignId, referralCode, action, score,
# reasonCodes, caseId} — is queryable without parsing a message string.
logging:
  structured:
    format:
      console: ecs
